services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${DB_USER:-vergabe}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vergabe}
      POSTGRES_DB: ${DB_NAME:-vergabe}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vergabe}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  setup:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-vergabe}:${DB_PASSWORD:-vergabe}@postgres:5432/${DB_NAME:-vergabe}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./scripts:/scripts
      - app_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true
    command: python /scripts/setup.py
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-vergabe}:${DB_PASSWORD:-vergabe}@postgres:5432/${DB_NAME:-vergabe}
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-vergabe@localhost}
      APP_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-https://vergabe.cycl.group}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    volumes:
      - app_data:/data
      - ./scripts/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: always

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-vergabe}:${DB_PASSWORD:-vergabe}@postgres:5432/${DB_NAME:-vergabe}
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-vergabe@localhost}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      setup:
        condition: service_completed_successfully
    volumes:
      - app_data:/data
      - ./scripts/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    command: python -m scheduler.main
    restart: always

  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
      target: production
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-vergabe}:${DB_PASSWORD:-vergabe}@postgres:5432/${DB_NAME:-vergabe}
    depends_on:
      setup:
        condition: service_completed_successfully
    volumes:
      - crawler_cache:/tmp/cache
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  postgres_data:
  crawler_cache:
  app_data:
  caddy_data:
  caddy_config:
